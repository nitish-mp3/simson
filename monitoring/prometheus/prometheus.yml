# =============================================================================
# prometheus.yml
# Prometheus configuration for HA-VoIP monitoring.
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    cluster: ha-voip
    environment: production

# Rule files for alerting
rule_files:
  - "alert-rules.yml"

# Scrape configurations
scrape_configs:
  # ---------------------------------------------------------------------------
  # VoIP Engine metrics
  # ---------------------------------------------------------------------------
  - job_name: "voip-engine"
    metrics_path: /metrics
    static_configs:
      - targets: ["voip-engine:9090"]
        labels:
          service: voip-engine
          component: sip-rtp-turn
    scrape_interval: 15s

  # ---------------------------------------------------------------------------
  # Prometheus self-monitoring
  # ---------------------------------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus

  # ---------------------------------------------------------------------------
  # Node Exporter (if deployed)
  # ---------------------------------------------------------------------------
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: node-exporter
    scrape_interval: 30s
