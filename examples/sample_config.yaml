# HA VoIP Engine — Full Configuration Reference
# ================================================
#
# This file documents every configuration option with defaults and
# explanatory comments.  Copy this to /etc/voip-engine/config.yaml
# (or mount it into the container) and edit as needed.
#
# Environment variable overrides use the prefix VOIP__ with double-
# underscore separators, e.g.  VOIP__SIP__UDP_PORT=5062

# ---------------------------------------------------------------------------
# SIP Signalling
# ---------------------------------------------------------------------------
sip:
  # UDP listen port for SIP messages (INVITE, REGISTER, BYE, etc.).
  # Set to 0 to disable UDP transport entirely.
  udp_port: 5060

  # TCP listen port.  Same port number as UDP is conventional but not required.
  tcp_port: 5060

  # TLS (SIPS) listen port.  Requires tls.cert_path and tls.key_path.
  tls_port: 5061

  # WebSocket (WS) listen port for browser-based SIP/WebRTC.
  ws_port: 8088

  # Secure WebSocket (WSS) listen port.  Requires TLS certificate.
  wss_port: 8089

  # SIP domain / realm used in From/To headers and digest authentication.
  domain: "homeassistant.local"

  # Enable or disable individual transports.
  enable_udp: true
  enable_tcp: true
  enable_tls: false       # Enable after configuring TLS certificates
  enable_ws: true
  enable_wss: false       # Enable after configuring TLS certificates

  # Maximum SIP message size in bytes.  Messages exceeding this are dropped.
  max_message_size: 65535

  # Address to bind SIP listeners to.  "0.0.0.0" = all interfaces.
  bind_addr: "0.0.0.0"

  # RFC 3261 timer values (milliseconds).  Rarely need changing.
  timer_t1_ms: 500        # RTT estimate; used for retransmission intervals
  timer_t2_ms: 4000       # Maximum retransmission interval for non-INVITE
  timer_t4_ms: 5000       # Maximum duration a message remains in the network

# ---------------------------------------------------------------------------
# Media (RTP / Codecs)
# ---------------------------------------------------------------------------
media:
  # Port range for RTP streams.  Each call uses two ports (RTP + RTCP).
  # A range of 10,000 ports supports ~5,000 concurrent calls.
  rtp_port_start: 10000
  rtp_port_end: 20000

  # Codecs offered in SDP, in priority order.
  # Supported: opus, pcma (G.711 A-law), pcmu (G.711 mu-law), g722
  codecs:
    - opus          # Wideband, low bitrate, best quality
    - pcma          # 64 kbps, most compatible
    - pcmu          # 64 kbps, North America default

  # Adaptive jitter buffer depth (milliseconds).
  jitter_buffer_min_ms: 20
  jitter_buffer_max_ms: 200

  # Encrypt media with SRTP.  Strongly recommended for production.
  enable_srtp: true

  # DTMF signalling mode:
  #   rfc2833 — out-of-band via RTP (recommended)
  #   inband  — in-band tone detection (unreliable over compressed codecs)
  #   info    — SIP INFO method
  dtmf_mode: "rfc2833"

  # Voice Activity Detection — skip sending silence frames.
  silence_detection: false

  # Comfort Noise Generator level in -dBov.  0 = disabled.
  comfort_noise_level: 30

# ---------------------------------------------------------------------------
# TURN / STUN Server (Embedded)
# ---------------------------------------------------------------------------
turn:
  # Enable the embedded TURN/STUN server.
  enabled: true

  # STUN/TURN UDP and TCP listen port.
  port: 3478

  # TURN-over-TLS port.  Used when UDP/TCP 3478 is blocked.
  tls_port: 5349

  # Alternative TLS port.  Port 443 is the ultimate fallback for restrictive
  # networks that only allow HTTPS traffic.
  alt_port: 443

  # TURN authentication realm.
  realm: "homeassistant.local"

  # Static credentials for development/testing.  For production, use
  # shared_secret for ephemeral credentials.
  users: []
  #  - username: "testuser"
  #    password: "testpassword"

  # Shared secret for RFC 8489 ephemeral (time-limited) credentials.
  # Generate with:  openssl rand -hex 32
  shared_secret: null

  # Maximum number of TURN allocations from a single IP address.
  max_allocations_per_ip: 10

  # Lifetime of a TURN allocation in seconds.  The client must refresh
  # before this expires.
  allocation_lifetime_sec: 600

  # Relay port range.  These ports are used to relay media between peers.
  relay_port_start: 49152
  relay_port_end: 65535

  # Maximum STUN/TURN requests per second from a single IP.
  rate_limit_per_sec: 50

# ---------------------------------------------------------------------------
# TLS Certificates
# ---------------------------------------------------------------------------
tls:
  # Path to the PEM-encoded TLS certificate (full chain recommended).
  cert_path: null         # e.g. "/ssl/fullchain.pem"

  # Path to the PEM-encoded private key.
  key_path: null           # e.g. "/ssl/privkey.pem"

  # Path to a CA certificate for verifying client certs (mTLS).
  ca_path: null

  # Require client certificates for gRPC connections (mTLS).
  require_client_cert: false

# ---------------------------------------------------------------------------
# Database
# ---------------------------------------------------------------------------
database:
  # Backend: "sqlite" (default, zero-config) or "postgres" (production scale).
  backend: "sqlite"

  # SQLite file path (relative to working directory or absolute).
  sqlite_path: "voip-engine.db"

  # PostgreSQL connection string.  Only used when backend = "postgres".
  postgres_url: null      # e.g. "postgresql://voip:password@localhost/voip_engine"

  # Maximum number of open database connections.
  max_connections: 10

# ---------------------------------------------------------------------------
# API / gRPC
# ---------------------------------------------------------------------------
api:
  # gRPC listen port.  The HA integration connects to this port.
  grpc_port: 50051

  # HTTP port for health checks (/health) and Prometheus metrics (/metrics).
  http_port: 8080

  # Bind address.  Set to "127.0.0.1" to restrict gRPC to localhost.
  bind_addr: "0.0.0.0"

  # API keys (bearer tokens).  At least one must be configured for
  # production use.  Generate with:  openssl rand -hex 32
  api_keys: []
  #  - "your-64-character-hex-key-here"

  # Enable mutual TLS for gRPC connections.
  enable_mtls: false

  # Maximum requests per second per API key.
  rate_limit_per_sec: 100

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  # Minimum log level: trace, debug, info, warn, error
  level: "info"

  # Output format: "text" (human-readable) or "json" (machine-parseable).
  format: "text"

  # Log file path.  If null, logs go to stdout (recommended for containers).
  file: null              # e.g. "/var/log/voip-engine/engine.log"

# ---------------------------------------------------------------------------
# Call Recording
# ---------------------------------------------------------------------------
recording:
  # Enable call recording globally.  Individual calls can override.
  enabled: false

  # Directory to store recordings.
  directory: "recordings"

  # Recording format: "opus" (compressed) or "wav" (uncompressed).
  format: "opus"

  # Encrypt recordings at rest with AES-256-GCM.
  encrypt: false

  # Base64-encoded 32-byte AES key.  Required when encrypt = true.
  # Generate with:  openssl rand -base64 32
  encryption_key: null

  # Maximum disk usage for recordings in MB.  0 = unlimited.
  # When the limit is reached, the oldest recordings are deleted.
  max_disk_mb: 0

  # Retention period in days.  0 = keep forever.
  # Recordings older than this are automatically deleted.
  retention_days: 0
