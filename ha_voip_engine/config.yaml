name: Simson
version: "1.0.6"
slug: ha_voip_engine
description: Embedded VoIP engine for the HA VoIP integration (SIP/TURN/WebRTC)
url: https://github.com/nitish-mp3/simson
startup: services
boot: auto
init: false
host_network: true
privileged:
  - NET_ADMIN
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
map:
  - config:rw
options:
  log_level: info
  log_format: json
schema:
  log_level: list(trace|debug|info|warn|error)
  log_format: list(json|pretty)
