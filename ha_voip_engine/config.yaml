name: Simson
version: "1.0.1"
slug: ha_voip_engine
description: Embedded VoIP engine for the HA VoIP integration (SIP/TURN/WebRTC)
url: https://github.com/nitish-mp3/simson
startup: services
boot: auto
init: false
host_network: true
privileged:
  - NET_ADMIN
  - NET_BIND_SERVICE
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
ports:
  5060/udp: 5060
  5061/tcp: 5061
  3478/udp: 3478
  5349/tcp: 5349
  8443/tcp: 8443
  50051/tcp: 50051
  9090/tcp: 9090
map:
  - config:rw
  - data:rw
options:
  log_level: info
  log_format: json
schema:
  log_level: list(trace|debug|info|warn|error)
  log_format: list(json|pretty)
# Official HA Debian base images — these are actual images HA provides.
# The Dockerfile does a multi-stage Rust compile on top of these.
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base-debian:bookworm
  amd64: ghcr.io/home-assistant/amd64-base-debian:bookworm
  armv7: ghcr.io/home-assistant/armv7-base-debian:bookworm
  armhf: ghcr.io/home-assistant/armhf-base-debian:bookworm
