# =============================================================================
# ci/github-actions.yml
# Complete CI/CD pipeline for HA-VoIP.
# In a real repository this file lives at .github/workflows/ci.yml
# =============================================================================

name: ha-voip CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  schedule:
    # Nightly fuzz testing at 03:00 UTC
    - cron: "0 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

permissions:
  contents: write
  packages: write
  security-events: write

# =============================================================================
# Jobs
# =============================================================================
jobs:
  # ---------------------------------------------------------------------------
  # a. Lint Rust
  # ---------------------------------------------------------------------------
  lint-rust:
    name: Lint Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: voip-engine
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            voip-engine/target
          key: rust-lint-${{ runner.os }}-${{ hashFiles('voip-engine/Cargo.lock') }}
          restore-keys: |
            rust-lint-${{ runner.os }}-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libopus-dev protobuf-compiler

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy -- -D warnings
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------
  # b. Lint Python
  # ---------------------------------------------------------------------------
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: integration/requirements.txt

      - name: Install lint tools
        run: pip install flake8 black mypy

      - name: Install project dependencies
        run: pip install -r integration/requirements.txt

      - name: flake8
        run: flake8 integration/ custom_components/ --max-line-length 120

      - name: black --check
        run: black --check --line-length 120 integration/ custom_components/

      - name: mypy
        run: mypy integration/ custom_components/ --ignore-missing-imports

  # ---------------------------------------------------------------------------
  # c. Lint Frontend
  # ---------------------------------------------------------------------------
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: npm run lint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # d. Test Rust
  # ---------------------------------------------------------------------------
  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: voip-engine
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            voip-engine/target
          key: rust-test-${{ runner.os }}-${{ hashFiles('voip-engine/Cargo.lock') }}
          restore-keys: |
            rust-test-${{ runner.os }}-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libopus-dev libsrtp2-dev protobuf-compiler

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: cargo test --all-features
        run: cargo test --all-features

      - name: cargo llvm-cov (coverage)
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: voip-engine/lcov.info
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------------------------
  # e. Test Python
  # ---------------------------------------------------------------------------
  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: integration/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r integration/requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: pytest --cov
        run: |
          pytest tests/python/ \
            --cov=integration --cov=custom_components \
            --cov-report=xml:coverage-python.xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage-python.xml
          flags: python
          token: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------------------------
  # f. Test Frontend
  # ---------------------------------------------------------------------------
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: npm test
        run: npm test

  # ---------------------------------------------------------------------------
  # g. Integration Test
  # ---------------------------------------------------------------------------
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [test-rust, test-python]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: docker compose up -d
        run: docker compose -f ops/docker-compose.yml up -d --build
        timeout-minutes: 10

      - name: Wait for health
        run: |
          echo "Waiting for voip-engine health..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9090/health/live >/dev/null 2>&1; then
              echo "voip-engine is healthy after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run integration test script
        run: bash ci/scripts/run-integration-test.sh
        timeout-minutes: 15

      - name: docker compose down
        if: always()
        run: docker compose -f ops/docker-compose.yml down -v --remove-orphans

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test-results/

  # ---------------------------------------------------------------------------
  # h. Security Scan
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: cargo audit
        run: |
          cargo install cargo-audit
          cd voip-engine && cargo audit

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r integration/requirements.txt

      - name: npm audit
        run: cd frontend && npm audit --audit-level=high

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ha-voip/voip-engine:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ---------------------------------------------------------------------------
  # i. Build Images
  # ---------------------------------------------------------------------------
  build-images:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [integration-test, security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (engine)
        id: meta-engine
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/voip-engine
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push engine
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ops/docker/Dockerfile.engine
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta-engine.outputs.tags }}
          labels: ${{ steps.meta-engine.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (integration)
        id: meta-integration
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ha-integration
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push integration
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ops/docker/Dockerfile.integration
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta-integration.outputs.tags }}
          labels: ${{ steps.meta-integration.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # j. Fuzz Test (nightly schedule only)
  # ---------------------------------------------------------------------------
  fuzz-test:
    name: Fuzz Test
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    defaults:
      run:
        working-directory: voip-engine
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libopus-dev protobuf-compiler

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: cargo fuzz run fuzz_sip_parser -- -max_total_time=300
        run: cargo fuzz run fuzz_sip_parser -- -max_total_time=300

      - name: Upload crash artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: voip-engine/fuzz/artifacts/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # k. Release (on tags v*)
  # ---------------------------------------------------------------------------
  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-images]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub release
        run: bash ci/scripts/create-release.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}

      - name: Upload artifacts to release
        run: |
          for file in artifacts/**/*.tar.gz artifacts/**/*.sha256; do
            if [ -f "$file" ]; then
              gh release upload "${{ github.ref_name }}" "$file" --clobber
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        run: |
          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ github.ref_name }}" \
            --jq '.body' > changelog.md || true
